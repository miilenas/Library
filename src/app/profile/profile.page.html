<ion-header class="custom-header" [translucent]="true">
  <ion-toolbar>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>



  <ion-content class="ion-padding">
  <ng-container *ngIf="userProfile$ | async as profile; else loading">
    <div class="profile-container">

      <ion-icon name="person-circle-outline" class="profile-icon"></ion-icon>

      <h2 class="full-name">{{ profile.firstName }} {{ profile.lastName }}</h2>

 </div>

  <ion-list class="custom-list" [inset]="true">
    <ion-item>
      <ion-label>
          <strong>First name:</strong> {{ profile.firstName }}
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
          <strong>Last name:</strong> {{ profile.lastName }}
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
          <strong>Email:</strong> {{ profile.email }}
      </ion-label>
    </ion-item>
  </ion-list>

<div style="display: flex; justify-content: center;">
  <ion-button color="danger" *ngIf="isAdmin" routerLink="/tabs/admin">Make Admin</ion-button>
</div> 

<ion-button expand="block" fill="clear" (click)="logout()" class="logout-button">
  <ion-icon name="log-out-outline" slot="icon-only"  color="danger"></ion-icon>
</ion-button>

 
  </ng-container>

  <ng-template #loading>
    <ion-text color="medium">Loading the profile...</ion-text>
  </ng-template>
</ion-content>
